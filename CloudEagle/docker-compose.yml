version: '3.8'

services:
  backend:
    build: .
    container_name: country-info-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - REST_COUNTRIES_BASE_URL=${REST_COUNTRIES_BASE_URL:-https://restcountries.com/v3.1}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  frontend:
    build: .
    container_name: country-info-frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://backend:8000
    command: streamlit run ui.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped

networks:
  default:
    name: country-info-network
